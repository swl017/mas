# QoS overrides for ros2 bag record.
# All BEST_EFFORT topics need overrides — rosbag defaults to RELIABLE.
#
# Usage:
#   bash bag/rosbag_record.sh
#
# Topics sourced from ARCHITECTURE.md topic map.

