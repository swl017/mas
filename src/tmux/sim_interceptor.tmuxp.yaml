# PN interception harness — INTERCEPTOR session (RA-L ticket 004, Slice 1).
#
# Role `interceptor` = px4_1 in roles.yaml layout `ego_1v1`. Runs the full
# ego-only sensing stack so the bearing EKF (added Slice 4) and PN guidance
# (added Slice 2) have all four inputs: camera_info, zoom, gimbal RPY, odom.
#
# Trimmed from simdrone1.tmuxp.yaml (the validated observer stack): keeps mavros,
# frame, camera, gimbal, offboard; drops triangulation/tracker/policy. The
# bearing_loc, pn_guidance, and mission windows are stubbed below and enabled in
# later slices.
#
# Bring up AFTER isaac_sim.tmuxp.yaml (Pegasus + PX4 SITL + gimbal_stabilizer).
#   tmuxp load sim_interceptor.tmuxp.yaml
# Arm + OFFBOARD are operator-driven via QGC.

session_name: interceptor

environment:
  ROS2_INSTALL_PATH: /home/usrg/ros2_humble/install
  ROS2_WORKSPACE: /home/usrg/mas
  ROBOT_NAME: px4_1            # roles.yaml ego_1v1.interceptor
  USE_SIM_TIME: 'true'

options:
  default-command: /bin/bash

windows:
- window_name: mavros
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mavros_replicator replicator.launch.py robot_name:=${ROBOT_NAME} use_sim_time:=${USE_SIM_TIME}

# NOTE: no PX4 attitude calibration is applied. The PX4 SITL EKF attitude bias is
# boot-variable (and drifts within a boot), so a fixed SENS_BOARD_*_OFF does not
# transfer — Ticket 004 runs the GENUINE end-to-end baseline with raw attitude
# (offsets zero) and treats each boot as an experimental block (report the
# boot-level attitude error; see ticket 004 sim_calibration.md +
# measure_attitude_error.py). The conductor records the boot attitude error.

- window_name: frame
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mas_common_frame common_frame_single.launch.py ns:=/${ROBOT_NAME} use_sim_time:=${USE_SIM_TIME}

- window_name: camera
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
    - CAMERA_RES="${CAMERA_RES:-mid}"
    - |-
      case "$CAMERA_RES" in
        low)  CAM_W=640;  CAM_H=360;  YOLO_MODEL=dronecop9-2-384x640.engine  ;;
        mid)  CAM_W=960;  CAM_H=540;  YOLO_MODEL=dronecop9-2-544x960.engine  ;;
        high) CAM_W=1920; CAM_H=1080; YOLO_MODEL=dronecop9-2-1088x1920.engine ;;
        *)    echo "unknown CAMERA_RES=$CAMERA_RES (use low|mid|high)" >&2; exit 1 ;;
      esac
      echo "CAMERA_RES=$CAMERA_RES  ${CAM_W}x${CAM_H}  model=$YOLO_MODEL"
  panes:
    - ros2 launch ultralytics_ros tracker_drone.launch.xml ns:=/${ROBOT_NAME} input_topic:=camera/color/image_raw yolo_model:=yolov11m-drone.pt use_sim_time:=${USE_SIM_TIME}

- window_name: gimbal
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    # Bring-up crutch (ticket 004): aim the gimbal at the target's GT position so
    # the ego-only EKF/PN chain can be validated before detection-based tracking
    # is wired through the mission gate. target_namespace resolves from roles.yaml
    # (`target` role). los_rate_controller (isaac_sim session) consumes
    # gimbal_cmd_los_world_deg in control_mode=position_velocity. Verified:
    # target centered (bbox ~image center) + YOLO detects at ~38 m, zoom 3.
    - ros2 run mas_pn_guidance gimbal_gt_tracker --ros-args -r __ns:=/${ROBOT_NAME} -p use_sim_time:=${USE_SIM_TIME}
    # Detection-based tracker (re-enable once the mission gate routes tracking
    # commands, Slice 2/5):
    # - ros2 run gimbal_controller gimbal_los_tracker_node --ros-args -r __ns:=/${ROBOT_NAME} -r gimbal_cmd_los_rate:=tracking/gimbal_cmd_los_rate -p target_topic:=/target_region -p use_sim_time:=${USE_SIM_TIME}

- window_name: offboard
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mas_offboard offboard.launch.py vehicle_filter:=${ROBOT_NAME} config_file:=config/vehicles_engagement.yaml use_sim_time:=${USE_SIM_TIME}

- window_name: bearing_ekf
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    # Ticket-004 estimator arms ONLY: simple_loc (SimpleEKF) + direct_loc
    # (DirectProjectionEKF). Excludes the 18D dc/vanilla filters (NaN-prone, out
    # of scope). Each node exposes a reset switch:
    #   ros2 service call /${ROBOT_NAME}/simple_ekf_node/reset std_srvs/srv/Trigger
    #   ros2 service call /${ROBOT_NAME}/direct_projection_ekf_node/reset std_srvs/srv/Trigger
    # Only ONE instance per vehicle — re-running this stacks duplicate node names.
    # init_range_guess MUST ≈ the engagement IC range (50 m). Per-arm tuned
    # noise params are baked into engagement_ekf.launch.py (ticket 004 tuning).
    - ros2 launch mas_bearing_loc engagement_ekf.launch.py vehicle:=${ROBOT_NAME} init_range_guess:=50.0 use_sim_time:=${USE_SIM_TIME}

# Slice 2: PN guidance -> pn/cmd_vel. estimate_source: oracle (validate the law)
# | simple_ekf | direct_projection. Override band per the matrix (v_max/a_max).
- window_name: pn_guidance
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mas_pn_guidance pn_guidance.launch.py ns:=/${ROBOT_NAME} estimate_source:=oracle v_max:=9.0 a_max:=6.0 use_sim_time:=${USE_SIM_TIME}

# Slice 2: engagement gate. engagement_source:=pn forwards pn/cmd_vel as cmd_vel
# in MISSION. Engage with: ros2 topic pub --once /mission_state_cmd std_msgs/Int8 "{data: 2}"
- window_name: mission
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mas_mission mission_deploy.launch.py vehicle_filter:=${ROBOT_NAME} engagement_source:=pn use_sim_time:=${USE_SIM_TIME}
