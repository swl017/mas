# PN interception harness — FUSION session (RA-L ticket 019).
#
# Interceptor-side cooperative belief (both observers RAW): mas_multiview triangulation
# (px4_1 + px4_2 detections of target px4_3) -> mas_tracker sort3d -> /px4_1/chosen_target_pose
# -> mas_coop_mock cv_smoother (adds velocity + optional whole-belief AoI) ->
# coop_loc/target_pose+twist -> pn_guidance (estimate_source=cooperative).
#
# AoI axis (conservative whole-belief model): ros2 param set /px4_1/cv_smoother latency_s <s>
# (+ latency_jitter_s, drop_p). This stales the WHOLE fused belief (a conservative bound on
# peer-only latency). The fair peer-only model (precomputed peer ray + ray_delay) is deferred
# (needs a point-to-ray Ceres cost in mas_multiview — an interface/architecture decision).
#
# Bring up AFTER isaac_sim + sim_interceptor(px4_1) + sim_coop_target(px4_3) + sim_observer(px4_2).

session_name: fusion

environment:
  ROS2_INSTALL_PATH: /home/usrg/ros2_humble/install
  ROS2_WORKSPACE: /home/usrg/mas
  ROBOT_NAME: px4_1
  USE_SIM_TIME: 'true'

options:
  default-command: /bin/bash

windows:
- window_name: triangulation
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - >-
      ros2 launch mas_multiview triangulation.launch.py ns:=/${ROBOT_NAME}
      num_camera:=2 camera_name_prefix:=/px4_ gimbal_angle_order:=zxy
      use_sim_time:=${USE_SIM_TIME}

- window_name: tracker
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - >-
      ros2 launch mas_tracker sort3d.launch.py ns:=/${ROBOT_NAME}
      num_cameras:=2 self_camera_index:=1 camera_name_prefix:=/px4_
      use_sim_time:=${USE_SIM_TIME}

- window_name: coop_mock
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - >-
      ros2 launch mas_coop_mock coop_mock.launch.py namespace:=${ROBOT_NAME}
      use_sim_time:=${USE_SIM_TIME}
