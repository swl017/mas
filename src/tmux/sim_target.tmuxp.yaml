# PN interception harness — TARGET session (RA-L ticket 004, Slice 1).
#
# Role `target` = px4_2 in roles.yaml layout `ego_1v1`. The non-cooperative
# maneuvering quarry: MAVROS-shaped link + common frame + offboard only. No
# perception (the interceptor senses it ego-only). The deterministic maneuver
# replay node (mas_offboard target_maneuver) is added in Slice 3.
#
# common_frame is kept so the conductor can read the target's ground-truth odom
# for scoring and the oracle arm, and so the maneuver node has a local frame.
#
# Bring up AFTER isaac_sim.tmuxp.yaml.
#   tmuxp load sim_target.tmuxp.yaml
# Arm + OFFBOARD are operator-driven via QGC.

session_name: target

environment:
  ROS2_INSTALL_PATH: /home/usrg/ros2_humble/install
  ROS2_WORKSPACE: /home/usrg/mas
  ROBOT_NAME: px4_2            # roles.yaml ego_1v1.target
  USE_SIM_TIME: 'true'

options:
  default-command: /bin/bash

windows:
- window_name: mavros
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mavros_replicator replicator.launch.py robot_name:=${ROBOT_NAME} use_sim_time:=${USE_SIM_TIME}

- window_name: frame
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mas_common_frame common_frame_single.launch.py ns:=/${ROBOT_NAME} use_sim_time:=${USE_SIM_TIME}

- window_name: offboard
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mas_offboard offboard.launch.py vehicle_filter:=${ROBOT_NAME} config_file:=config/vehicles_engagement.yaml use_sim_time:=${USE_SIM_TIME}

# Slice 3: the target flies the regime. mas_mission (engagement_source:=maneuver)
# forwards maneuver/cmd_vel as cmd_vel in MISSION, so ONE global MISSION=2 engages
# both drones (interceptor PN + target maneuver) synchronously.
- window_name: mission
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    - ros2 launch mas_mission mission_deploy.launch.py vehicle_filter:=${ROBOT_NAME} engagement_source:=maneuver use_sim_time:=${USE_SIM_TIME}

- window_name: maneuver
  focus: false
  layout: tiled
  shell_command_before:
    - source ${ROS2_INSTALL_PATH}/setup.bash && source ${ROS2_WORKSPACE}/install/setup.bash
  panes:
    # regime: static_wind | dynamic_mild | dynamic_paper | dynamic_hard (the conductor sets this per trial)
    - ros2 launch mas_offboard target_maneuver.launch.py vehicle_filter:=${ROBOT_NAME} regime:=dynamic_mild use_sim_time:=${USE_SIM_TIME}

