# Shared parameters applied to every per-vehicle policy_node instance.
# Vehicle-specific params (vehicle_name, peer_names) are set by the launch file.
/**:
  ros__parameters:
    # --- Checkpoint ---
    checkpoint_path: ""  # Path to SKRL .pt checkpoint file (required)

    # --- Network architecture ---
    num_agents: 2        # obs_dim computed: 30 + 16*(num_agents-1) [+ 6 triangulation]
    action_dim: 7        # vx, vy, vz, yaw_rate, gimbal_az_rate, gimbal_el_rate, zoom_rate
    architecture: "mappo_rnn"  # "mappo_rnn" or "ppo_mlp"
    hidden_size: 64
    gru_hidden_size: 64
    gru_num_layers: 1

    # --- Control ---
    control_frequency: 25.0  # Hz (must match training decimation)
    max_lin_vel: 10.0        # m/s
    max_yaw_rate: 0.7854     # rad/s (45 deg/s)
    max_gimbal_rate: 3.141592653589793  # rad/s (180 deg/s, must match training env)
    max_zoom_rate: 1.0       # zoom-levels/s (must match training env)
    device: "cpu"

    # --- Observation ---
    image_width: 640
    image_height: 480
    max_bbox_aoi: 20.0       # clip bbox age-of-information (s), matches training episode length
    enable_triangulation: true
    use_common_frame: true
    stale_timeout: 2.0

    # --- Safety ---
    enable_cbf: true
    cbf_D_s: 2.0
    cbf_v_max: 15.0
    cbf_tau_delay_max: 0.2
    cbf_tau_px4: 0.3
    cbf_gamma_deploy: 1.0
    cbf_num_iters: 2

    # --- Debug ---
    dry_run: false
