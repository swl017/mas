# Ticket-010 boundary sweep — N=2 PN (parallax-preserving) + OLD estimator tuning.
# Reproduction manifest: encodes the boots actually run on 2026-07-06 (boot ids
# here carry an R2 suffix so a re-run never collides with the originals; the
# original data lives in 2026-RAL-.../tickets/010-n2-pn-old-ekf-boundary-sweep/
# results/data/).
#
# Prerequisites (see EXPERIMENT.md):
#   profiles/install_profile.sh ekf OLD
#   profiles/install_profile.sh pn  N2
#   -> verify: PN ready-line N=2.0; installed sigma_pix=1.0/sigma_target_acc=5.0

session:
  interceptor_ns: px4_1
  target_ns: px4_2
  interceptor_ic: [0.0, -50.0]
  ic_tol_m: 1.5
  seed: 42
  use_sim_time: true
  record: true
  bag_script: /home/usrg/mas/bag/rosbag_record_reduced.sh
  bag_dir: /home/usrg/mas/bag

output:
  results_dir: /home/usrg/mas/src/mas_pn_guidance/experiments/results/ticket010_n2_old_r2

gate:
  geometry: crossing
  forward_speed: 4.0
  lateral_accel: 0.0
  estimator: oracle
  max_cpa_m: 0.5        # observed healthy: 0.03-0.18 m

policies:
  settle_error_streak_abort: 3
  on_boot_abort: stop

boots:
  - id: N2BCR2          # benign x crossing (9 cells x 3 arms)
    geometries: crossing
    forward_speeds: [2, 3, 4]
    lateral_accels: [0, 0.75, 1.5]
    estimators: [oracle, simple_ekf, direct_projection]
    repeats: 1
  - id: N2BTR2          # benign x tail
    geometries: tail_chase
    forward_speeds: [2, 3, 4]
    lateral_accels: [0, 0.75, 1.5]
    estimators: [oracle, simple_ekf, direct_projection]
    repeats: 1
  - id: N2CC1R2         # challenging x crossing, low speeds
    geometries: crossing
    forward_speeds: [4.5, 6]
    lateral_accels: [1.5, 3, 4.5, 7.0]
    estimators: [oracle, simple_ekf, direct_projection]
    repeats: 1
  - id: N2CC2R2         # challenging x crossing, wall speeds
    geometries: crossing
    forward_speeds: [7, 8]
    lateral_accels: [1.5, 3, 4.5, 7.0]
    estimators: [oracle, simple_ekf, direct_projection]
    repeats: 1
  - id: N2CT1R2         # challenging x tail, low speeds.
    # WARNING (ticket-010 incident): failed vf6 tail chases strand the
    # interceptor far from IC -> settle_error cascade -> PX4 auto-disarm on
    # ground; the streak watchdog kills the boot, but expect to lose cells here.
    geometries: tail_chase
    forward_speeds: [4.5, 6]
    lateral_accels: [1.5, 3, 4.5, 7.0]
    estimators: [oracle, simple_ekf, direct_projection]
    repeats: 1
  # N2CT2 (tail, vf 7-8) intentionally ABSENT: skipped by user decision
  # (2026-07-06). 008 got mostly settle_error there (stranded chases); under
  # N=2 the same failure mode already appears at vf6 tail. Known stranding
  # regime — hazardous to session health, no usable data expected.
