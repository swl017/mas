# run_sweep.py manifest template — copy, rename, and edit.
# Every boot id must be FRESH (never reused across sessions); the runner refuses
# a boot whose boot_<id>_results.csv already exists in the bag dir.

session:
  interceptor_ns: px4_1
  target_ns: px4_2
  interceptor_ic: [0.0, -50.0]     # common-frame x, y the conductor settles to
  ic_tol_m: 1.5
  seed: 42                         # deterministic trial shuffle (0 = nondet)
  use_sim_time: true
  record: true
  bag_script: /home/usrg/mas/bag/rosbag_record_reduced.sh   # ~13-topic recorder
  bag_dir: /home/usrg/mas/bag

output:
  results_dir: /home/usrg/mas/src/mas_pn_guidance/experiments/results/EDIT_ME

# Optional 1-trial oracle health gate, run before the first boot. The session is
# refused if the gate CPA misses max_cpa_m (session-level sensing degradation —
# restart the sim). Reference: oracle on a straight low-speed cell ~0.03-0.2 m.
gate:
  geometry: crossing
  forward_speed: 4.0
  lateral_accel: 0.0
  estimator: oracle
  max_cpa_m: 0.5

policies:
  settle_error_streak_abort: 3     # kill the boot on K consecutive settle_errors
  on_boot_abort: stop              # stop | continue

boots:
  - id: EDIT_BC                    # benign x crossing example
    geometries: crossing           # crossing | tail_chase (one per boot)
    forward_speeds: [2, 3, 4]      # m/s
    lateral_accels: [0, 0.75, 1.5] # m/s^2
    estimators: [oracle, simple_ekf, direct_projection]
    repeats: 1
