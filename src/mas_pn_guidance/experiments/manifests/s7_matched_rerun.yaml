# RAL ticket 024 S7 — MATCHED CLOSED-LOOP RERUN with the corrected smoother
# (S4 sigma/window + S5 association/gates + S6 warm-start, S7 fixedlag backend via the
# sim_fusion_matched_fgo session). Full 18-trial matrix: crossing straight-CV vf3+vf5 x
# tau {0, 0.10, 0.20} x 3 reps, instrumented recorder (arrival times + solver_diagnostics +
# rays) — the exact-interface audit S2 lacked. Compared against the S2 matched CV-KF baseline
# (BM_*, results/s2_baseline_matched_20260716 — reused, documented). Separate results_dir.
session:
  interceptor_ns: px4_1
  observer_ns: px4_2
  target_ns: px4_3
  interceptor_ic: [0.0, -50.0]
  ic_tol_m: 1.5
  seed: 42
  use_sim_time: true
  record: true
  bag_script: /home/usrg/mas/bag/rosbag_record_reduced.sh
  bag_dir: /home/usrg/mas/bag
output:
  results_dir: /home/usrg/mas/src/mas_pn_guidance/experiments/results/s7_matched_rerun_20260719
gate:
  geometry: crossing
  forward_speed: 4.0
  lateral_accel: 0.0
  estimator: oracle
  max_cpa_m: 0.5
policies:
  settle_error_streak_abort: 3
  on_boot_abort: continue
boots:
  - id: SMFL_T0
    geometries: crossing
    forward_speeds: [3, 5]
    lateral_accels: [0]
    estimators: [cooperative]
    repeats: 3
    live_params: {/px4_1/ray_delay_matched: {latency_s: 0.0}}
  - id: SMFL_T10
    geometries: crossing
    forward_speeds: [3, 5]
    lateral_accels: [0]
    estimators: [cooperative]
    repeats: 3
    live_params: {/px4_1/ray_delay_matched: {latency_s: 0.10}}
  - id: SMFL_T20
    geometries: crossing
    forward_speeds: [3, 5]
    lateral_accels: [0]
    estimators: [cooperative]
    repeats: 3
    live_params: {/px4_1/ray_delay_matched: {latency_s: 0.20}}
