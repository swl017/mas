# RAL ticket 024 pre-S4 (rev2 gate) — LATENCY-VARIANT instrumented capture (CAPSM_T10).
# Same instrumented capture as s2_capture_trackB.yaml but with the matched peer-ray delay at
# tau=0.10 s, so the bag contains genuinely out-of-sequence peer rays (arrival ~0.10 s after
# capture stamp). Purpose: validate the v2 ARRIVAL-ORDER offline replay (OOSM fidelity) — the
# one rev2 gate item a T0 bag cannot exercise. Separate results_dir; S2/S3 evidence untouched.
session:
  interceptor_ns: px4_1
  observer_ns: px4_2
  target_ns: px4_3
  interceptor_ic: [0.0, -50.0]
  ic_tol_m: 1.5
  seed: 42
  use_sim_time: true
  record: true
  bag_script: /home/usrg/mas/bag/rosbag_record_reduced.sh
  bag_dir: /home/usrg/mas/bag
output:
  results_dir: /home/usrg/mas/src/mas_pn_guidance/experiments/results/s3_trackB_capture_T10_20260719
gate:
  geometry: crossing
  forward_speed: 4.0
  lateral_accel: 0.0
  estimator: oracle
  max_cpa_m: 0.5
policies:
  settle_error_streak_abort: 3
  on_boot_abort: continue
boots:
  - id: CAPSM_T10
    geometries: crossing
    forward_speeds: [5]
    lateral_accels: [0]
    estimators: [cooperative]
    repeats: 3
    live_params: {/px4_1/ray_delay_matched: {latency_s: 0.10}}
