# Ticket 024 S2 — cooperative GTSAM SMOOTHER arm head-to-head (fair peer-only AoI).
#
# Arm = the mas_multiview_fgo smoother (run sim_fusion_fgo.tmuxp for this manifest).
# Baseline arm = the sort3d CV-KF (run sim_fusion.tmuxp + the s2_baseline manifest).
# Both use estimator=cooperative (both publish coop_loc); pn untouched. Fair peer-only
# latency: live-set /px4_1/ray_delay_fgo latency_s per boot (fresh ego never staled).
#
# Roles (coop_1obs): interceptor px4_1, observer px4_2, target px4_3.
# Straight-CV ego-miss cells: crossing vf3 (slow) + vf5 (fast); tau in {0, 0.10, 0.20} s.
# Boot ids + results_dir are FRESH per session (runner refuses reused ids).

session:
  interceptor_ns: px4_1
  observer_ns: px4_2
  target_ns: px4_3
  interceptor_ic: [0.0, -50.0]
  ic_tol_m: 1.5
  seed: 42
  use_sim_time: true
  record: true
  bag_script: /home/usrg/mas/bag/rosbag_record_reduced.sh
  bag_dir: /home/usrg/mas/bag

output:
  results_dir: /home/usrg/mas/src/mas_pn_guidance/experiments/results/s2_smoother_20260716

gate:
  geometry: crossing
  forward_speed: 4.0
  lateral_accel: 0.0
  estimator: oracle
  max_cpa_m: 0.5

policies:
  settle_error_streak_abort: 3
  on_boot_abort: stop

boots:
  # --- SMOKE: one cell (vf3, tau=0) to verify the CPA-scoring loop with the smoother ---
  - id: FGO_SMOKE_V3T0
    geometries: crossing
    forward_speeds: [3]
    lateral_accels: [0]
    estimators: [cooperative]
    repeats: 1
    live_params:
      /px4_1/ray_delay_fgo: {latency_s: 0.0}

  # --- FULL head-to-head cells (uncomment after the smoke boot passes) ---
  # vf3 latency sweep
  # - id: FGO_V3T0
  #   geometries: crossing
  #   forward_speeds: [3]
  #   lateral_accels: [0]
  #   estimators: [cooperative]
  #   repeats: 3
