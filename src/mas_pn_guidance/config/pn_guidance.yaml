# PN guidance parameters — values match the Ticket 003 point-mass baseline
# (research/bearing_localization/interception_baseline/scenario_grid.py):
#   navigation_constant = 3.0, intercept_radius_m = 0.5, interceptor bands below.
# The held band for the first sim matrix is paper_nominal_low (9 m/s, 6 m/s^2).
/**:
  ros__parameters:
    nav_constant: 2.0           # N — parallax-preserving PN (ticket 010); point-mass baseline was 3.0
    v_max: 9.0                  # paper_nominal_low interceptor_v_max_mps
    a_max: 6.0                  # paper_nominal_low interceptor_a_max_mps2
    control_rate_hz: 50.0
    # oracle | simple_ekf | direct_projection | dc_ekf
    estimate_source: oracle
    target_namespace: ''        # oracle: '' -> roles.yaml 'target'
    stale_timeout_s: 0.5
    cov_trace_gate: 0.0         # EKF arms: >0 skips high-covariance estimates (m^2 trace)
    engage_in_mission_only: true
    # true = faithful to the point-mass, which feeds PN the vehicle's ACTUAL
    # propagated velocity (it tracks perfectly, so there is no command/actual
    # split). In sim the measured ego-odom velocity is that actual velocity;
    # using it makes closing-speed/LOS-rate reflect the real PX4 tracking (incl.
    # the ~10 s accel ramp). false uses the integrated v_cmd setpoint, which
    # assumes perfect tracking and HIDES the controller-dynamics mismatch
    # (ticket 004 review, finding 2).
    guidance_uses_measured_velocity: true
    # pn = range-sensitive (LOS rate from cross(r,v)/|r|^2, from the 3-D estimate);
    # bearing_pn = range-tolerant (LOS rate from the STAMPED position-derived bearing
    #   history + a relative-velocity closing term); see pn_law.pn_from_los_rate, ticket 011.
    # raw_ibvs = range-FREE (LOS rate from the RAW detection bearing bearing_raw/los,
    #   decoupled from the EKF target_pose; own-speed-along-LOS closing); ticket 012.
    #   Requires mas_bearing_loc raw_los_node publishing {ns}/bearing_raw/los.
    guidance_mode: pn
    los_rate_ema_alpha: 0.7     # EMA smoothing on the measured LOS rate (bearing_pn/raw_ibvs); clamped to [0,1]
    # raw_ibvs detection-dropout policy (aged by detection header time):
    los_timeout_s: 0.3          # within this: use the measured LOS rate at full weight
    los_lost_s: 0.8             # timeout..lost: coast the rate to zero; past lost: target lost (zero cmd)

# Other interceptor bands (set v_max/a_max to sweep later; PX4 MPC limits must be
# matched per band via mas_pn_guidance set_px4_limits / px4_bands.yaml):
#   quad_conservative  7 / 4     paper_nominal_high 11 / 8
#   paper_nominal_low  9 / 6     paper_optimistic   13 / 12
# Conductor success threshold: intercept_radius_m = 0.5 (point-mass parity).
