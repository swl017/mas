# Role -> PX4 namespace map for the PN interception harness (RA-L ticket 004).
#
# Logical roles are decoupled from px4_N namespaces so the cooperative layout is
# a config edit, not a code change. The conductor, tmux sessions, and launch
# files all resolve namespaces through this file (see mas_pn_guidance/roles.py).
#
# Active layout is selected by `active:`. All namespaces must exist in
# mas_offboard/config/vehicles.yaml.

active: coop_1obs

layouts:

  # Ticket 004 first pass: ego-only 1v1.
  ego_1v1:
    interceptor: px4_1   # full ego sensing stack + PN guidance
    target:      px4_2   # non-cooperative maneuvering quarry

  # Planned cooperative layout (later ticket). Same code, config-only switch:
  # two observers triangulate the target, a dedicated interceptor runs PN on the
  # fused estimate.
  cooperative:
    observer_a:  px4_1
    observer_b:  px4_2
    target:      px4_3
    interceptor: px4_4

  # Ticket 019 mock-cooperative: interceptor (also fusion camera 1) + one dedicated
  # observer (fusion camera 2). Target = px4_3, OUTSIDE the fusion camera set, so its
  # detections are NOT removed by the multiview self-detection filter (which drops any
  # detection whose ray passes < 2 m of a registered camera).
  coop_1obs:
    interceptor: px4_1   # PN + fusion camera 1
    observer_a:  px4_2   # dedicated mock observer (fusion camera 2)
    target:      px4_3   # maneuvering quarry, not a fusion camera
